version: '3.8'

services:
  # Next.js Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rishabh_store_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5001/api
      - NEXT_PUBLIC_SOCKET_URL=http://backend:5001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # Node.js/Express Backend App
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rishabh_store_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
      - MONGO_URI=mongodb://mongo:27017/rishabh_store
      - JWT_SECRET=local-development-secret-key-12345
      - JWT_EXPIRE=30d
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - app-network

  # Local MongoDB Database (For Testing)
  mongo:
    image: mongo:latest
    container_name: rishabh_store_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
